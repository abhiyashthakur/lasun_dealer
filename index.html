<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lasun Dealer</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fb;
        color: #172b4d;
      }
      main {
        max-width: 720px;
        margin: 64px auto;
        padding: 0 20px;
      }
      h1 {
        margin-bottom: 12px;
      }
      p {
        line-height: 1.5;
      }
    </style>
    <script>
      window.watsonAssistantChatOptions = {
        integrationID: "d96fbca8-9da4-4a67-b36d-00fbe9ed83c9", // The ID of this integration.
        region: "jp-tok", // The region your integration is hosted in.
        serviceInstanceID: "65e8343b-2d75-4314-9e42-e80f850be5b6", // The ID of your service instance.
        onLoad: async (instance) => { await instance.render(); }
      };

      setTimeout(function () {
        const t = document.createElement("script");
        t.src =
          "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
          (window.watsonAssistantChatOptions.clientVersion || "latest") +
          "/WatsonAssistantChatEntry.js";
        document.head.appendChild(t);
      }, 0);
    </script>
  </head>
  <body>
    <main>
      <h1>Lasun Dealer</h1>
      <p>Welcome to the Lasun Dealer website. The assistant chat widget should load in the corner.</p>
    </main>
  </body>
</html>
