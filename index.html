<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Chat Bot</title>
    <style>
      /* ── Reset & base ── */
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      header .logo {
        font-size: 28px;
        line-height: 1;
      }
      header h1 {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #e2c96e;
      }
      header .subtitle {
        font-size: 0.78rem;
        color: #9ab0c8;
        margin-top: 2px;
      }

      /* ── Main layout ── */
      .app-body {
        flex: 1;
        display: flex;
        gap: 0;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
      }

      /* ── Left panel – board ── */
      .board-panel {
        flex: 0 0 auto;
        width: 420px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .panel-card {
        background: #16213e;
        border-radius: 12px;
        padding: 18px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      }
      .panel-card h2 {
        margin: 0 0 14px;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #9ab0c8;
      }

      /* Chessboard grid */
      .chessboard {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(8, 1fr);
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 6px;
        overflow: hidden;
        border: 3px solid #0f3460;
        box-shadow: 0 0 20px rgba(226,201,110,0.15);
      }
      .sq {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(16px, 3vw, 28px);
        cursor: default;
        user-select: none;
        position: relative;
      }
      .sq.light { background: #f0d9b5; }
      .sq.dark  { background: #b58863; }
      .sq .coord {
        position: absolute;
        font-size: 9px;
        font-weight: 600;
        opacity: 0.55;
        bottom: 2px;
        right: 3px;
        color: inherit;
      }
      .sq.light .coord { color: #b58863; }
      .sq.dark  .coord { color: #f0d9b5; }

      /* Board controls */
      .board-controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        flex: 1;
        padding: 9px 14px;
        border: none;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.1s;
      }
      .btn:active { transform: scale(0.97); }
      .btn-primary {
        background: #e2c96e;
        color: #1a1a2e;
      }
      .btn-secondary {
        background: #0f3460;
        color: #e0e0e0;
        border: 1px solid #1e5c9e;
      }
      .btn:hover { opacity: 0.88; }

      /* Status bar */
      .status-bar {
        background: #0f3460;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.83rem;
        color: #9ab0c8;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4caf50;
        flex-shrink: 0;
        box-shadow: 0 0 6px #4caf5080;
      }

      /* ── Right panel – chat ── */
      .chat-panel {
        flex: 1;
        min-width: 0;
        margin-left: 20px;
        display: flex;
        flex-direction: column;
      }
      .chat-card {
        background: #16213e;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .chat-header {
        padding: 14px 18px;
        border-bottom: 1px solid #0f3460;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .chat-header .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #e2c96e, #b58863);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .chat-header .info .name {
        font-weight: 700;
        font-size: 0.95rem;
        color: #e2c96e;
      }
      .chat-header .info .desc {
        font-size: 0.75rem;
        color: #9ab0c8;
      }

      /* Message list */
      #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        scroll-behavior: smooth;
      }
      #chat-messages::-webkit-scrollbar { width: 5px; }
      #chat-messages::-webkit-scrollbar-track { background: transparent; }
      #chat-messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }

      .msg-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
      }
      .msg-row.user { flex-direction: row-reverse; }

      .msg-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #0f3460;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
      }
      .msg-row.user .msg-avatar {
        background: linear-gradient(135deg, #e2c96e, #b58863);
      }

      .bubble {
        max-width: 72%;
        padding: 10px 14px;
        border-radius: 16px;
        font-size: 0.88rem;
        line-height: 1.5;
        word-break: break-word;
      }
      .msg-row.assistant .bubble {
        background: #0f3460;
        color: #e0e0e0;
        border-bottom-left-radius: 4px;
      }
      .msg-row.user .bubble {
        background: #e2c96e;
        color: #1a1a2e;
        border-bottom-right-radius: 4px;
      }
      .bubble .timestamp {
        display: block;
        font-size: 0.68rem;
        opacity: 0.6;
        margin-top: 4px;
      }

      /* Typing indicator */
      .typing-dots {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        padding: 4px 0;
      }
      .typing-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #9ab0c8;
        animation: bounce 1.2s infinite;
      }
      .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
      .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); }
        30%            { transform: translateY(-6px); }
      }

      /* Input area */
      .chat-input-area {
        padding: 14px 16px;
        border-top: 1px solid #0f3460;
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      #chat-input {
        flex: 1;
        background: #0f3460;
        border: 1px solid #1e5c9e;
        border-radius: 22px;
        padding: 10px 16px;
        color: #e0e0e0;
        font-size: 0.9rem;
        resize: none;
        outline: none;
        font-family: inherit;
        max-height: 120px;
        min-height: 42px;
        line-height: 1.4;
        transition: border-color 0.2s;
      }
      #chat-input::placeholder { color: #4a6a88; }
      #chat-input:focus { border-color: #e2c96e; }
      #send-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: #e2c96e;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: opacity 0.15s, transform 0.1s;
        color: #1a1a2e;
        font-size: 18px;
      }
      #send-btn:hover { opacity: 0.85; }
      #send-btn:active { transform: scale(0.93); }

      /* ── Responsive: mobile ── */
      @media (max-width: 768px) {
        .app-body {
          flex-direction: column;
          padding: 12px;
        }
        .board-panel {
          width: 100%;
        }
        .chat-panel {
          margin-left: 0;
          min-height: 420px;
        }
      }
    </style>

    <!-- Watson Assistant Chat integration (preserved) -->
    <script>
      window.watsonAssistantChatOptions = {
        integrationID: "d96fbca8-9da4-4a67-b36d-00fbe9ed83c9",
        region: "jp-tok",
        serviceInstanceID: "65e8343b-2d75-4314-9e42-e80f850be5b6",
        onLoad: async (instance) => { await instance.render(); }
      };

      setTimeout(function () {
        const t = document.createElement("script");
        t.src =
          "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
          (window.watsonAssistantChatOptions.clientVersion || "latest") +
          "/WatsonAssistantChatEntry.js";
        document.head.appendChild(t);
      }, 0);
    </script>
  </head>
  <body>

    <!-- ══ Header ══ -->
    <header>
      <span class="logo">♟️</span>
      <div>
        <h1>Chess Chat Bot</h1>
        <div class="subtitle">Ask me anything about chess — openings, strategy, puzzles &amp; more</div>
      </div>
    </header>

    <!-- ══ App body ══ -->
    <div class="app-body">

      <!-- Left: board panel -->
      <aside class="board-panel">
        <div class="panel-card">
          <h2>Board</h2>
          <div class="chessboard" id="chessboard" aria-label="Chess board"></div>
        </div>

        <div class="panel-card">
          <div class="board-controls">
            <button class="btn btn-primary" id="new-game-btn">♟ New Game</button>
            <button class="btn btn-secondary" id="flip-btn">⇅ Flip Board</button>
          </div>
        </div>

        <div class="status-bar">
          <span class="status-dot"></span>
          <span id="game-status">White to move &mdash; standard starting position</span>
        </div>
      </aside>

      <!-- Right: chat panel -->
      <section class="chat-panel">
        <div class="chat-card">
          <div class="chat-header">
            <div class="avatar">♛</div>
            <div class="info">
              <div class="name">Chess Bot</div>
              <div class="desc">Powered by Watson Assistant · always ready to help</div>
            </div>
          </div>

          <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages">
            <!-- Welcome message -->
          </div>

          <div class="chat-input-area">
            <textarea
              id="chat-input"
              rows="1"
              placeholder="Ask about chess openings, moves, strategy…"
              aria-label="Type a message"
            ></textarea>
            <button id="send-btn" aria-label="Send message">&#10148;</button>
          </div>
        </div>
      </section>

    </div><!-- /.app-body -->

    <script>
      /* ──────────────────────────────────────────
         Chessboard rendering
      ────────────────────────────────────────── */
      const FILES = ['a','b','c','d','e','f','g','h'];
      const PIECES = {
        // rank 8 (black)
        a8:'♜', b8:'♞', c8:'♝', d8:'♛', e8:'♚', f8:'♝', g8:'♞', h8:'♜',
        // rank 7 (black pawns)
        a7:'♟', b7:'♟', c7:'♟', d7:'♟', e7:'♟', f7:'♟', g7:'♟', h7:'♟',
        // rank 2 (white pawns)
        a2:'♙', b2:'♙', c2:'♙', d2:'♙', e2:'♙', f2:'♙', g2:'♙', h2:'♙',
        // rank 1 (white)
        a1:'♖', b1:'♘', c1:'♗', d1:'♕', e1:'♔', f1:'♗', g1:'♘', h1:'♖',
      };

      let flipped = false;

      function buildBoard(flip) {
        const board = document.getElementById('chessboard');
        board.innerHTML = '';
        const ranks = flip
          ? [1,2,3,4,5,6,7,8]
          : [8,7,6,5,4,3,2,1];
        const files = flip
          ? ['h','g','f','e','d','c','b','a']
          : ['a','b','c','d','e','f','g','h'];

        ranks.forEach((rank, ri) => {
          files.forEach((file, fi) => {
            const sq = document.createElement('div');
            const isLight = (ri + fi) % 2 === 0;
            sq.className = 'sq ' + (isLight ? 'light' : 'dark');
            sq.dataset.square = file + rank;

            const key = file + rank;
            if (PIECES[key]) {
              sq.textContent = PIECES[key];
            }

            // show file label on last rank, rank label on last file
            if (ri === 7) {
              const c = document.createElement('span');
              c.className = 'coord';
              c.textContent = file;
              sq.appendChild(c);
            }
            board.appendChild(sq);
          });
        });
      }

      buildBoard(false);

      document.getElementById('flip-btn').addEventListener('click', () => {
        flipped = !flipped;
        buildBoard(flipped);
      });

      document.getElementById('new-game-btn').addEventListener('click', () => {
        flipped = false;
        buildBoard(false);
        document.getElementById('game-status').textContent =
          'White to move \u2014 standard starting position';
        appendMessage('assistant', 'New game started! Good luck. Ask me anything about chess strategy or openings.');
      });

      /* ──────────────────────────────────────────
         Chat UI helpers
      ────────────────────────────────────────── */
      function now() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      function appendMessage(role, text) {
        const log = document.getElementById('chat-messages');
        const row = document.createElement('div');
        row.className = 'msg-row ' + role;

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = role === 'user' ? '👤' : '♛';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;

        const ts = document.createElement('span');
        ts.className = 'timestamp';
        ts.textContent = now();
        bubble.appendChild(ts);

        row.appendChild(avatar);
        row.appendChild(bubble);
        log.appendChild(row);
        log.scrollTop = log.scrollHeight;
      }

      function showTyping() {
        const log = document.getElementById('chat-messages');
        const row = document.createElement('div');
        row.className = 'msg-row assistant';
        row.id = 'typing-indicator';

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = '♛';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

        row.appendChild(avatar);
        row.appendChild(bubble);
        log.appendChild(row);
        log.scrollTop = log.scrollHeight;
        return row;
      }

      function removeTyping() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
      }

      /* ──────────────────────────────────────────
         Bot responses (placeholder – replace with
         Watson Assistant API call as needed)
      ────────────────────────────────────────── */
      const BOT_REPLIES = [
        "Great question! In chess, controlling the center with pawns (e4, d4) is a key principle.",
        "The Sicilian Defence is one of the most popular responses to 1.e4. It leads to sharp, asymmetrical positions.",
        "Checkmate with a king and queen against a lone king is a fundamental endgame technique.",
        "The Ruy López (Spanish Opening) has been played at the highest levels for centuries.",
        "En passant is a special pawn capture that can only occur immediately after a pawn advances two squares.",
        "Castling is often vital to king safety — try to castle within the first 10 moves!",
        "Study tactics every day: forks, pins, skewers, discovered attacks — they win games.",
        "Magnus Carlsen became World Champion in 2013 and dominated the chess world for over a decade.",
      ];
      let replyIdx = 0;

      function getBotReply() {
        return BOT_REPLIES[replyIdx++ % BOT_REPLIES.length];
      }

      function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        input.value = '';
        input.style.height = 'auto';

        const typing = showTyping();
        setTimeout(() => {
          removeTyping();
          appendMessage('assistant', getBotReply());
        }, 900 + Math.random() * 600);
      }

      document.getElementById('send-btn').addEventListener('click', sendMessage);

      document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Auto-resize textarea
      document.getElementById('chat-input').addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });

      /* ── Initial greeting ── */
      appendMessage('assistant', "Hi! ♟ I'm your Chess Chat Bot. Ask me about openings, tactics, rules, or famous games — I'm here to help you improve your chess!");
    </script>

  </body>
</html>
